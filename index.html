<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>sea-speed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@300;500;700&family=Archivo:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1D2E;
    --deep: #071523;
    --foam: #EFF6F4;
    --signal: #FF5A1F;
    --slate: #5E7A8C;
    --ok: #3ADFA0;
  }
  body[data-theme="orza"] {
    --navy: #0E1848;
    --deep: #070E30;
    --foam: #F2F6FF;
    --signal: #29A9E0;
    --slate: #6C7DB5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--deep);
    color: var(--foam);
    font-family: 'Archivo', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ---------- Livelli di sfondo ---------- */
  #mapCanvas, #trackCanvas, #windCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #mapCanvas { opacity: .55; filter: saturate(.65) brightness(.95); }
  #windCanvas { opacity: .85; }
  .bg-vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 90% 55% at 50% 42%, rgba(7,21,35,.15), rgba(7,21,35,.45) 80%),
      linear-gradient(to bottom, rgba(7,21,35,.7), transparent 16%, transparent 78%, rgba(7,21,35,.75));
  }
  header, .stats, .timeline, .controls { position: relative; z-index: 2; }
  main { position: relative; z-index: 2; touch-action: none; }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 10px;
    border-bottom: 1px solid rgba(94,122,140,.25);
  }
  .brand { display: flex; flex-direction: column; gap: 3px; }
  .brand-row { display: flex; align-items: center; gap: 8px; }
  .brand h1 {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .brand span {
    font-family: 'Chivo Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    color: var(--slate);
    text-transform: uppercase;
  }
  .brand img {
    height: 40px;
    display: none;
    background: #fff;
    border-radius: 8px;
    padding: 2px;
  }
  body[data-theme="orza"] .brand img { display: block; }
  body[data-theme="orza"] .brand h1 { display: none; }
  body[data-theme="orza"] .brand span { display: none; }

  .theme-toggle {
    display: flex;
    align-items: center;
    border: 1px solid rgba(94,122,140,.35);
    border-radius: 999px;
    padding: 3px;
    background: rgba(7,21,35,.55);
    backdrop-filter: blur(4px);
    cursor: pointer;
  }
  .theme-toggle span {
    font-family: 'Chivo Mono', monospace;
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--slate);
    padding: 4px 8px;
    border-radius: 999px;
    transition: background .2s, color .2s;
  }
  .theme-toggle span.on { background: var(--signal); color: #fff; }

  .gps-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Chivo Mono', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--slate);
    border: 1px solid rgba(94,122,140,.35);
    border-radius: 999px;
    padding: 5px 10px;
    background: rgba(7,21,35,.55);
    backdrop-filter: blur(4px);
  }
  .gps-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--slate);
    transition: background .3s;
  }
  .gps-pill.live .gps-dot { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .gps-pill.live { color: var(--ok); border-color: rgba(58,223,160,.4); }
  .gps-pill.err .gps-dot { background: var(--signal); }
  .gps-pill.err { color: var(--signal); border-color: rgba(255,90,31,.4); }

  /* ---------- Main ---------- */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 18px;
  }
  .speed-block {
    text-align: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .speed-value {
    font-family: 'Chivo Mono', monospace;
    font-weight: 700;
    font-size: clamp(96px, 34vw, 180px);
    line-height: .95;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 2px 24px rgba(7,21,35,.9), 0 0 60px rgba(7,21,35,.7);
  }
  .speed-value.stale { color: var(--slate); }
  .speed-unit {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-family: 'Chivo Mono', monospace;
    font-size: 14px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--signal);
    font-weight: 500;
    text-shadow: 0 1px 10px rgba(7,21,35,.9);
  }
  .speed-unit small { font-size: 9px; color: var(--slate); letter-spacing: .12em; }
  .wind-label {
    margin-top: 18px;
    font-family: 'Chivo Mono', monospace;
    font-size: 11px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--slate);
    text-shadow: 0 1px 8px rgba(7,21,35,.9);
    text-align: center;
  }
  .wind-label b { color: var(--foam); font-weight: 500; }
  .wind-label small { font-size: 9px; color: var(--slate); }
  .hint {
    margin-top: 8px;
    text-align: center;
    font-family: 'Chivo Mono', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    color: var(--slate);
    text-shadow: 0 1px 8px rgba(7,21,35,.9);
  }

  /* ---------- Rosa dei venti ---------- */
  .rose {
    position: fixed;
    top: 78px;
    right: 10px;
    width: 132px;
    z-index: 2;
    pointer-events: none;
  }
  .rose svg { width: 100%; height: auto; display: block; }
  .rose circle.ring {
    fill: color-mix(in srgb, var(--deep) 45%, transparent);
    stroke: rgba(94,122,140,.5);
    stroke-width: 1.5;
  }
  .rose line.spoke { stroke: rgba(94,122,140,.45); stroke-width: 1.5; }
  .rose line.spoke.active { stroke: var(--signal); stroke-width: 3; }
  .rose text {
    font-family: 'Chivo Mono', monospace;
    font-size: 11px;
    letter-spacing: .06em;
    fill: var(--slate);
    text-transform: uppercase;
    paint-order: stroke;
    stroke: rgba(7,21,35,.85);
    stroke-width: 3px;
  }
  .rose text.active { fill: var(--signal); font-weight: 700; }
  .rose #roseNeedle line { stroke: var(--signal); stroke-width: 3; stroke-linecap: round; }
  .rose #roseNeedle polygon { fill: var(--signal); }

  /* ---------- Controlli mappa ---------- */
  .mapbtns {
    position: fixed;
    top: 78px;
    left: 10px;
    z-index: 3;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .mapbtn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    border: 1px solid rgba(94,122,140,.4);
    background: color-mix(in srgb, var(--navy) 80%, transparent);
    backdrop-filter: blur(4px);
    color: var(--foam);
    font-size: 20px;
    font-weight: 700;
    font-family: 'Chivo Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
  }
  .mapbtn:active { transform: scale(.94); }
  #recenterBtn.follow { color: var(--signal); border-color: var(--signal); }

  /* ---------- Timeline vento ---------- */
  .timeline {
    display: flex;
    overflow-x: auto;
    gap: 2px;
    padding: 8px 10px;
    background: color-mix(in srgb, var(--navy) 90%, transparent);
    backdrop-filter: blur(4px);
    border-top: 1px solid rgba(94,122,140,.25);
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .timeline::-webkit-scrollbar { display: none; }
  .tl-slot {
    flex: 0 0 auto;
    width: 52px;
    text-align: center;
    font-family: 'Chivo Mono', monospace;
    padding: 4px 0 6px;
    border-radius: 8px;
  }
  .tl-slot.now { background: rgba(94,122,140,.22); outline: 1px solid rgba(94,122,140,.45); }
  .tl-slot.sel { background: color-mix(in srgb, var(--signal) 18%, transparent); outline: 1px solid var(--signal); }
  .tl-day {
    font-size: 8px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--signal);
    height: 11px;
    white-space: nowrap;
  }
  .tl-hour { font-size: 10px; color: var(--slate); }
  .tl-arrow { font-size: 15px; line-height: 1.2; color: var(--foam); display: block; }
  .tl-kn { font-size: 12px; font-weight: 700; }
  .tl-gust { font-size: 9px; opacity: .75; }
  .tl-gust::before { content: "raff "; color: var(--slate); }
  .tl-wave { font-size: 9px; color: #7FD4E8; }

  /* ---------- Stats ---------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: rgba(94,122,140,.25);
    border-top: 1px solid rgba(94,122,140,.25);
  }
  .stat {
    background: color-mix(in srgb, var(--navy) 88%, transparent);
    backdrop-filter: blur(4px);
    padding: 14px 8px 16px;
    text-align: center;
  }
  .stat b {
    display: block;
    font-family: 'Chivo Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .stat span {
    display: block;
    margin-top: 4px;
    font-family: 'Chivo Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--slate);
  }

  /* ---------- Controls ---------- */
  .controls {
    display: flex;
    gap: 10px;
    padding: 14px 18px calc(16px + env(safe-area-inset-bottom));
    background: color-mix(in srgb, var(--navy) 92%, transparent);
    backdrop-filter: blur(4px);
  }
  button {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: .1em;
    text-transform: uppercase;
    border: none;
    border-radius: 12px;
    padding: 16px 0;
    cursor: pointer;
    transition: transform .1s, opacity .2s;
  }
  button:active { transform: scale(.97); }
  button:focus-visible { outline: 3px solid var(--foam); outline-offset: 2px; }
  #startBtn { flex: 2; background: var(--signal); color: #fff; }
  #startBtn.running {
    background: color-mix(in srgb, var(--signal) 15%, transparent);
    color: var(--signal);
    border: 1px solid var(--signal);
  }
  #logBtn, #resetBtn {
    flex: 1;
    background: transparent;
    color: var(--slate);
    border: 1px solid rgba(94,122,140,.4);
  }

  /* ---------- Pannello uscite ---------- */
  .panel {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: color-mix(in srgb, var(--deep) 96%, transparent);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    padding: 18px;
  }
  .panel[hidden] { display: none; }
  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .panel-head h2 {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .panel-head button {
    width: 40px; height: 40px;
    padding: 0;
    border-radius: 10px;
    background: transparent;
    color: var(--foam);
    border: 1px solid rgba(94,122,140,.4);
    font-size: 16px;
  }
  .sess-list { overflow-y: auto; flex: 1; }
  .sess-item {
    background: color-mix(in srgb, var(--navy) 85%, transparent);
    border: 1px solid rgba(94,122,140,.3);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .sess-date {
    font-family: 'Chivo Mono', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--signal);
  }
  .sess-nums {
    font-family: 'Chivo Mono', monospace;
    font-size: 13px;
    margin: 6px 0 10px;
  }
  .sess-nums span { color: var(--slate); font-size: 10px; }
  .sess-actions { display: flex; gap: 8px; }
  .sess-actions button {
    flex: 1;
    padding: 9px 0;
    font-size: 11px;
    background: transparent;
    color: var(--foam);
    border: 1px solid rgba(94,122,140,.4);
    border-radius: 9px;
  }
  .sess-actions button.del { flex: 0 0 44px; color: var(--slate); }
  .sess-empty {
    text-align: center;
    color: var(--slate);
    font-family: 'Chivo Mono', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    margin-top: 40px;
  }

  @media (prefers-reduced-motion: reduce) {
    .gps-dot, button { transition: none; }
  }
</style>
</head>

<script>
(function () {
  const UNITS = [
    { key: 'kn',  label: 'NODI', factor: 1.943844 },
    { key: 'kmh', label: 'KM/H', factor: 3.6 },
    { key: 'mph', label: 'MPH',  factor: 2.236936 }
  ];
  let unitIdx = 0;
  let watchId = null, running = false;
  let maxMs = 0, sumMs = 0, samples = 0, lastMs = 0;
  let lastFix = null, lastHeading = null, lastPos = null;
  let wakeLock = null;
  let windFrom = null, windKn = null, windGust = null, waveNow = null;
  let lastWindFetch = 0;
  let preview = null, slotData = [];
  let sessionStart = null;

  const effFrom = () => preview ? preview.dir : windFrom;
  const effKn   = () => preview ? preview.kn  : windKn;

  const $ = id => document.getElementById(id);
  const speedValue = $('speedValue'), unitLabel = $('unitLabel');
  const maxVal = $('maxVal'), avgVal = $('avgVal'), hdgVal = $('hdgVal'), distVal = $('distVal');
  const gpsPill = $('gpsPill'), gpsLabel = $('gpsLabel');
  const startBtn = $('startBtn'), resetBtn = $('resetBtn'), logBtn = $('logBtn');
  const windLabel = $('windLabel'), accHint = $('accHint');
  const timelineEl = $('timeline');
  const mapCanvas = $('mapCanvas'), trackCanvas = $('trackCanvas'), windCanvas = $('windCanvas');
  const mapCtx = mapCanvas.getContext('2d');
  const trackCtx = trackCanvas.getContext('2d');
  const windCtx = windCanvas.getContext('2d');
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const GIORNI = ['dom','lun','mar','mer','gio','ven','sab'];
  const CARDINALI = ['N','NE','E','SE','S','SO','O','NO'];
  const cardinale = deg => CARDINALI[Math.round(deg / 45) % 8];
  const VENTI = ['Tramontana','Grecale','Levante','Scirocco','Ostro','Libeccio','Ponente','Maestrale'];
  const nomeVento = deg => VENTI[Math.round(deg / 45) % 8];
  const accent = () => getComputedStyle(document.body).getPropertyValue('--signal').trim() || '#FF5A1F';

  function buzz() { try { if (navigator.vibrate) navigator.vibrate(10); } catch (_) {} }
  function fmt(ms) { return (ms * UNITS[unitIdx].factor).toFixed(1); }

  function haversine(a, b) {
    const R = 6371000, rad = Math.PI / 180;
    const dLat = (b.latitude - a.latitude) * rad;
    const dLon = (b.longitude - a.longitude) * rad;
    const s = Math.sin(dLat/2)**2 +
      Math.cos(a.latitude*rad) * Math.cos(b.latitude*rad) * Math.sin(dLon/2)**2;
    return 2 * R * Math.asin(Math.sqrt(s));
  }

  function render() {
    speedValue.textContent = fmt(lastMs);
    maxVal.textContent = fmt(maxMs);
    avgVal.textContent = samples ? fmt(sumMs / samples) : fmt(0);
    unitLabel.textContent = UNITS[unitIdx].label;
  }

  /* ================= VISTA MAPPA (pan / zoom / follow) ================= */
  const TILE = 256, MINZ = 9, MAXZ = 16;
  let viewZoom = 13, viewLat = null, viewLon = null, follow = true;
  const recenterBtn = $('recenterBtn');

  const lon2x = (lon, z) => (lon + 180) / 360 * Math.pow(2, z) * TILE;
  const lat2y = (lat, z) => {
    const r = lat * Math.PI / 180;
    return (1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * Math.pow(2, z) * TILE;
  };
  const x2lon = (x, z) => x / (Math.pow(2, z) * TILE) * 360 - 180;
  const y2lat = (y, z) => {
    const n = Math.PI - 2 * Math.PI * y / (Math.pow(2, z) * TILE);
    return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
  };
  const toScreen = (la, lo) => ({
    x: trackCanvas.width / 2 + (lon2x(lo, viewZoom) - lon2x(viewLon, viewZoom)),
    y: trackCanvas.height / 2 + (lat2y(la, viewZoom) - lat2y(viewLat, viewZoom))
  });

  /* --- tile cache + disegno mappa --- */
  const tileCache = new Map();
  let mapRaf = null;
  function requestMapDraw() {
    if (mapRaf) return;
    mapRaf = requestAnimationFrame(() => { mapRaf = null; drawMapNow(); });
  }
  function drawMapNow() {
    const W = mapCanvas.width, H = mapCanvas.height;
    mapCtx.fillStyle = '#071523';
    mapCtx.fillRect(0, 0, W, H);
    if (viewLat == null) return;

    const z = viewZoom, n = Math.pow(2, z);
    const cxw = lon2x(viewLon, z), cyw = lat2y(viewLat, z);
    const x0 = cxw - W / 2, y0 = cyw - H / 2;
    const tx0 = Math.floor(x0 / TILE), ty0 = Math.floor(y0 / TILE);
    const tx1 = Math.floor((x0 + W) / TILE), ty1 = Math.floor((y0 + H) / TILE);

    for (let tx = tx0; tx <= tx1; tx++) {
      for (let ty = ty0; ty <= ty1; ty++) {
        if (tx < 0 || ty < 0 || tx >= n || ty >= n) continue;
        const key = z + '/' + tx + '/' + ty;
        let img = tileCache.get(key);
        if (!img) {
          img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = requestMapDraw;
          img.src = 'https://tile.openstreetmap.org/' + key + '.png';
          tileCache.set(key, img);
          if (tileCache.size > 300) { // limita la cache
            const first = tileCache.keys().next().value;
            tileCache.delete(first);
          }
        }
        if (img.complete && img.naturalWidth) {
          mapCtx.drawImage(img, Math.round(tx * TILE - x0), Math.round(ty * TILE - y0), TILE, TILE);
        }
      }
    }
  }

  function setFollow(on) {
    follow = on;
    recenterBtn.classList.toggle('follow', on);
  }
  recenterBtn.addEventListener('click', () => {
    reviewTrack = null;
    setFollow(true);
    if (lastPos) { viewLat = lastPos.la; viewLon = lastPos.lo; }
    accHint.textContent = '';
    requestMapDraw();
    drawOverlay();
    buzz();
  });
  $('zoomInBtn').addEventListener('click', () => zoomBy(1));
  $('zoomOutBtn').addEventListener('click', () => zoomBy(-1));
  function zoomBy(d) {
    const nz = Math.max(MINZ, Math.min(MAXZ, viewZoom + d));
    if (nz === viewZoom) return;
    viewZoom = nz;
    requestMapDraw();
    drawOverlay();
  }

  /* --- gesti: trascina per muoverti, pizzica per lo zoom --- */
  const mainArea = $('mainArea');
  const pointers = new Map();
  let panMoved = false, panTimer = null, pinchBase = null;

  mainArea.addEventListener('pointerdown', e => {
    mainArea.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 2) {
      const [a, b] = [...pointers.values()];
      pinchBase = Math.hypot(a.x - b.x, a.y - b.y);
    }
  });
  mainArea.addEventListener('pointermove', e => {
    if (!pointers.has(e.pointerId) || viewLat == null) return;
    const p = pointers.get(e.pointerId);
    const dx = e.clientX - p.x, dy = e.clientY - p.y;
    p.x = e.clientX; p.y = e.clientY;

    if (pointers.size === 1) {
      if (Math.abs(dx) + Math.abs(dy) > 2) {
        panMoved = true;
        setFollow(false);
        const dpr = mapCanvas.width / innerWidth;
        viewLon = x2lon(lon2x(viewLon, viewZoom) - dx * dpr, viewZoom);
        viewLat = y2lat(lat2y(viewLat, viewZoom) - dy * dpr, viewZoom);
        requestMapDraw();
        drawOverlay();
      }
    } else if (pointers.size === 2 && pinchBase) {
      const [a, b] = [...pointers.values()];
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      const ratio = d / pinchBase;
      if (ratio > 1.25) { zoomBy(1); pinchBase = d; panMoved = true; }
      else if (ratio < 0.8) { zoomBy(-1); pinchBase = d; panMoved = true; }
    }
  });
  function endPointer(e) {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) pinchBase = null;
    if (pointers.size === 0) {
      clearTimeout(panTimer);
      panTimer = setTimeout(() => { panMoved = false; }, 120);
    }
  }
  mainArea.addEventListener('pointerup', endPointer);
  mainArea.addEventListener('pointercancel', endPointer);

  /* ================= TRACCIA + MARKER POSIZIONE ================= */
  let track = [], trackNm = 0;
  let reviewTrack = null; // traccia di un'uscita passata in visualizzazione

  function loadLive() {
    try {
      const raw = localStorage.getItem('ss-live');
      if (raw) {
        track = JSON.parse(raw);
        trackNm = 0;
        for (let i = 1; i < track.length; i++) {
          trackNm += haversine(
            { latitude: track[i-1].la, longitude: track[i-1].lo },
            { latitude: track[i].la,   longitude: track[i].lo }
          ) / 1852;
        }
        distVal.textContent = trackNm.toFixed(1);
        if (track.length && viewLat == null) {
          const last = track[track.length - 1];
          viewLat = last.la; viewLon = last.lo;
          requestMapDraw();
        }
      }
    } catch (_) {}
  }
  let savePending = 0;
  function saveLive() {
    savePending++;
    if (savePending < 5) return;
    savePending = 0;
    try { localStorage.setItem('ss-live', JSON.stringify(track)); } catch (_) {}
  }
  function recordPoint(la, lo) {
    const last = track[track.length - 1];
    if (last) {
      const d = haversine(
        { latitude: last.la, longitude: last.lo },
        { latitude: la, longitude: lo }
      );
      if (d < 8) return;
      trackNm += d / 1852;
      distVal.textContent = trackNm.toFixed(1);
    }
    track.push({ la: +la.toFixed(6), lo: +lo.toFixed(6) });
    if (track.length > 8000) {
      const half = Math.floor(track.length / 2);
      track = track.filter((_, i) => i >= half || i % 2 === 0);
    }
    saveLive();
  }

  function drawPolyline(pts) {
    trackCtx.lineJoin = 'round';
    trackCtx.lineCap = 'round';
    // bordo bianco sotto...
    trackCtx.strokeStyle = 'rgba(255,255,255,.9)';
    trackCtx.lineWidth = 7;
    trace(pts);
    // ...colore del tema sopra
    trackCtx.strokeStyle = accent();
    trackCtx.lineWidth = 4;
    trace(pts);
    // pallino di partenza
    const s = toScreen(pts[0].la, pts[0].lo);
    trackCtx.beginPath();
    trackCtx.arc(s.x, s.y, 6, 0, Math.PI * 2);
    trackCtx.fillStyle = '#fff';
    trackCtx.fill();
    trackCtx.lineWidth = 2;
    trackCtx.strokeStyle = accent();
    trackCtx.stroke();
  }
  function trace(pts) {
    trackCtx.beginPath();
    for (let i = 0; i < pts.length; i++) {
      const p = toScreen(pts[i].la, pts[i].lo);
      i === 0 ? trackCtx.moveTo(p.x, p.y) : trackCtx.lineTo(p.x, p.y);
    }
    trackCtx.stroke();
  }

  function drawOverlay() {
    const W = trackCanvas.width, H = trackCanvas.height;
    trackCtx.clearRect(0, 0, W, H);
    if (viewLat == null) return;

    const pts = reviewTrack || track;
    if (pts.length > 1) drawPolyline(pts);

    // marker posizione: ben evidente
    if (lastPos && !reviewTrack) {
      const m = toScreen(lastPos.la, lastPos.lo);
      const ac = accent();
      // alone
      trackCtx.beginPath();
      trackCtx.arc(m.x, m.y, 20, 0, Math.PI * 2);
      trackCtx.fillStyle = ac;
      trackCtx.globalAlpha = .22;
      trackCtx.fill();
      trackCtx.globalAlpha = 1;
      // punto con anello bianco
      trackCtx.beginPath();
      trackCtx.arc(m.x, m.y, 9, 0, Math.PI * 2);
      trackCtx.fillStyle = ac;
      trackCtx.fill();
      trackCtx.lineWidth = 3.5;
      trackCtx.strokeStyle = '#fff';
      trackCtx.stroke();
      // freccia di rotta
      if (lastHeading != null) {
        const a = lastHeading * Math.PI / 180;
        trackCtx.save();
        trackCtx.translate(m.x, m.y);
        trackCtx.rotate(a);
        trackCtx.beginPath();
        trackCtx.moveTo(0, -26);
        trackCtx.lineTo(-7, -13);
        trackCtx.lineTo(7, -13);
        trackCtx.closePath();
        trackCtx.fillStyle = '#fff';
        trackCtx.fill();
        trackCtx.restore();
      }
    }
  }

  /* ================= STORICO USCITE ================= */
  let sessions = [];
  const panel = $('panel'), sessList = $('sessList');
  function loadSessions() {
    try { sessions = JSON.parse(localStorage.getItem('ss-sessions') || '[]'); } catch (_) { sessions = []; }
  }
  function saveSessions() {
    try { localStorage.setItem('ss-sessions', JSON.stringify(sessions)); } catch (_) {}
  }
  function thin(pts, max) {
    if (pts.length <= max) return pts;
    const step = pts.length / max;
    const out = [];
    for (let i = 0; i < max; i++) out.push(pts[Math.floor(i * step)]);
    out.push(pts[pts.length - 1]);
    return out;
  }
  function archiveSession() {
    if (track.length < 2 || trackNm < 0.05) return;
    sessions.unshift({
      id: Date.now(),
      start: sessionStart || Date.now(),
      end: Date.now(),
      nm: +trackNm.toFixed(2),
      maxKn: +(maxMs * 1.943844).toFixed(1),
      avgKn: samples ? +(sumMs / samples * 1.943844).toFixed(1) : 0,
      pts: thin(track, 1500)
    });
    sessions = sessions.slice(0, 30);
    saveSessions();
  }
  function fmtDate(ts) {
    const d = new Date(ts);
    return GIORNI[d.getDay()] + ' ' + d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' }) +
      ' · ' + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  }
  function renderSessions() {
    sessList.innerHTML = '';
    if (!sessions.length) {
      sessList.innerHTML = '<div class="sess-empty">Nessuna uscita salvata.<br>Le uscite si archiviano premendo Stop.</div>';
      return;
    }
    sessions.forEach(s => {
      const el = document.createElement('div');
      el.className = 'sess-item';
      el.innerHTML =
        '<div class="sess-date">' + fmtDate(s.start) + '</div>' +
        '<div class="sess-nums">' + s.nm.toFixed(1) + ' <span>NM</span> &nbsp; ' +
        s.maxKn.toFixed(1) + ' <span>MAX KN</span> &nbsp; ' +
        s.avgKn.toFixed(1) + ' <span>MEDIA KN</span></div>' +
        '<div class="sess-actions">' +
        '<button data-act="map">Mappa</button>' +
        '<button data-act="gpx">GPX</button>' +
        '<button data-act="del" class="del">&#10005;</button></div>';
      el.querySelector('[data-act="map"]').addEventListener('click', () => viewSession(s));
      el.querySelector('[data-act="gpx"]').addEventListener('click', () => exportGpx(s));
      el.querySelector('[data-act="del"]').addEventListener('click', () => {
        sessions = sessions.filter(x => x.id !== s.id);
        saveSessions();
        renderSessions();
        buzz();
      });
      sessList.appendChild(el);
    });
  }
  logBtn.addEventListener('click', () => { renderSessions(); panel.hidden = false; });
  $('panelClose').addEventListener('click', () => { panel.hidden = true; });

  function viewSession(s) {
    reviewTrack = s.pts;
    setFollow(false);
    // inquadra la traccia
    let minLa = 90, maxLa = -90, minLo = 180, maxLo = -180;
    for (const p of s.pts) {
      if (p.la < minLa) minLa = p.la; if (p.la > maxLa) maxLa = p.la;
      if (p.lo < minLo) minLo = p.lo; if (p.lo > maxLo) maxLo = p.lo;
    }
    viewLat = (minLa + maxLa) / 2;
    viewLon = (minLo + maxLo) / 2;
    for (let z = MAXZ; z >= MINZ; z--) {
      const w = lon2x(maxLo, z) - lon2x(minLo, z);
      const h = lat2y(minLa, z) - lat2y(maxLa, z);
      if (w < mapCanvas.width * 0.8 && Math.abs(h) < mapCanvas.height * 0.6) { viewZoom = z; break; }
      viewZoom = z;
    }
    panel.hidden = true;
    accHint.textContent = 'uscita del ' + fmtDate(s.start) + ' · tocca \u2316 per tornare al live';
    requestMapDraw();
    drawOverlay();
  }

  function exportGpx(s) {
    const d = new Date(s.start);
    let xml = '<?xml version="1.0" encoding="UTF-8"?>\n' +
      '<gpx version="1.1" creator="sea-speed" xmlns="http://www.topografix.com/GPX/1/1">\n' +
      '<trk><name>Uscita ' + d.toLocaleDateString('it-IT') + '</name><trkseg>\n';
    for (const p of s.pts) xml += '<trkpt lat="' + p.la + '" lon="' + p.lo + '"/>\n';
    xml += '</trkseg></trk>\n</gpx>';
    const blob = new Blob([xml], { type: 'application/gpx+xml' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'sea-speed-' + d.toISOString().slice(0, 10) + '.gpx';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }

  /* ================= DIMENSIONI CANVAS ================= */
  function sizeCanvases() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    for (const c of [mapCanvas, trackCanvas, windCanvas]) {
      c.width = Math.round(innerWidth * dpr);
      c.height = Math.round(innerHeight * dpr);
    }
    initParticles();
    requestMapDraw();
    drawOverlay();
  }
  window.addEventListener('resize', sizeCanvases);

  /* ================= ROSA DEI VENTI ================= */
  const roseSpokes = $('roseSpokes'), roseNeedle = $('roseNeedle');
  const SVGNS = 'http://www.w3.org/2000/svg';
  const spokeEls = [];
  for (let i = 0; i < 8; i++) {
    const a = i * 45 * Math.PI / 180;
    const l = document.createElementNS(SVGNS, 'line');
    l.setAttribute('x1', 100 + 22 * Math.sin(a));
    l.setAttribute('y1', 100 - 22 * Math.cos(a));
    l.setAttribute('x2', 100 + 64 * Math.sin(a));
    l.setAttribute('y2', 100 - 64 * Math.cos(a));
    l.setAttribute('class', 'spoke');
    roseSpokes.appendChild(l);
    spokeEls.push(l);
  }
  function renderRose() {
    const f = effFrom();
    if (f == null) return;
    const oct = Math.round(f / 45) % 8;
    for (let i = 0; i < 8; i++) {
      spokeEls[i].classList.toggle('active', i === oct);
      const t = $('rn' + i);
      if (t) t.classList.toggle('active', i === oct);
    }
    roseNeedle.setAttribute('visibility', 'visible');
    roseNeedle.setAttribute('transform', 'rotate(' + Math.round(f) + ' 100 100)');
  }

  /* ================= ETICHETTA VENTO ================= */
  function renderWindLabel() {
    if (preview) {
      const t = preview.t;
      let txt = '<span style="color:var(--signal)">PREVISIONE ' + GIORNI[t.getDay()] + ' ' +
        t.getDate() + ' h' + String(t.getHours()).padStart(2, '0') + '</span> · <b>' +
        nomeVento(preview.dir) + '</b> ' + Math.round(preview.kn) + ' kn' +
        (preview.gust != null ? ' <small>(raff. ' + Math.round(preview.gust) + ')</small>' : '') +
        ' · da ' + cardinale(preview.dir);
      if (preview.wave != null) txt += ' · onde ' + preview.wave.toFixed(1).replace('.', ',') + ' m';
      windLabel.innerHTML = txt;
      renderRose();
      if (reducedMotion) drawStaticArrows();
      return;
    }
    if (windFrom == null) return;
    const knTxt = windKn != null ? windKn.toFixed(0) + ' kn' : '';
    let txt = '<b>' + nomeVento(windFrom) + '</b> ' + knTxt +
      (windGust != null ? ' <small>(raff. ' + Math.round(windGust) + ')</small>' : '') +
      ' · da ' + cardinale(windFrom) + ' (' + Math.round(windFrom) + '°)';
    if (waveNow != null) txt += ' · onde ' + waveNow.toFixed(1).replace('.', ',') + ' m';
    if (lastHeading != null) {
      const rel = ((windFrom - lastHeading + 540) % 360) - 180;
      const side = rel > 8 ? 'a dritta' : rel < -8 ? 'a sinistra' : 'in prua';
      txt += ' · ' + (side === 'in prua' ? 'in prua' : Math.abs(Math.round(rel)) + '° ' + side);
    }
    windLabel.innerHTML = txt;
    renderRose();
  }

  /* ================= PARTICELLE VENTO ================= */
  let particles = [];
  const N_PART = 130;
  function initParticles() {
    particles = [];
    for (let i = 0; i < N_PART; i++) particles.push(spawn());
  }
  function spawn() {
    return {
      x: Math.random() * windCanvas.width,
      y: Math.random() * windCanvas.height,
      life: 40 + Math.random() * 80
    };
  }
  function animate() {
    const W = windCanvas.width, H = windCanvas.height;
    windCtx.globalCompositeOperation = 'destination-in';
    windCtx.fillStyle = 'rgba(0,0,0,0.94)';
    windCtx.fillRect(0, 0, W, H);
    windCtx.globalCompositeOperation = 'source-over';

    if (effFrom() != null) {
      const toRad = (effFrom() + 180) * Math.PI / 180;
      const spd = 0.4 + (effKn() || 5) * 0.14;
      const vx = Math.sin(toRad) * spd;
      const vy = -Math.cos(toRad) * spd;

      windCtx.strokeStyle = 'rgba(239,246,244,0.75)';
      windCtx.lineWidth = 1.4;
      windCtx.lineCap = 'round';
      windCtx.beginPath();
      for (const p of particles) {
        const nx = p.x + vx, ny = p.y + vy;
        windCtx.moveTo(p.x, p.y);
        windCtx.lineTo(nx, ny);
        p.x = nx; p.y = ny;
        p.life--;
        if (p.life <= 0 || nx < -20 || ny < -20 || nx > W + 20 || ny > H + 20) {
          Object.assign(p, spawn(), { life: 40 + Math.random() * 80 });
        }
      }
      windCtx.stroke();
    }
    requestAnimationFrame(animate);
  }
  function drawStaticArrows() {
    const W = windCanvas.width, H = windCanvas.height;
    windCtx.clearRect(0, 0, W, H);
    if (effFrom() == null) return;
    const toRad = (effFrom() + 180) * Math.PI / 180;
    const step = 90;
    windCtx.strokeStyle = 'rgba(239,246,244,0.5)';
    windCtx.lineWidth = 1.5;
    for (let x = step / 2; x < W; x += step) {
      for (let y = step / 2; y < H; y += step) {
        const len = 18;
        const ex = x + Math.sin(toRad) * len, ey = y - Math.cos(toRad) * len;
        windCtx.beginPath();
        windCtx.moveTo(x, y);
        windCtx.lineTo(ex, ey);
        const a = Math.atan2(ey - y, ex - x);
        windCtx.lineTo(ex - 6 * Math.cos(a - 0.5), ey - 6 * Math.sin(a - 0.5));
        windCtx.moveTo(ex, ey);
        windCtx.lineTo(ex - 6 * Math.cos(a + 0.5), ey - 6 * Math.sin(a + 0.5));
        windCtx.stroke();
      }
    }
  }

  /* ================= TIMELINE VENTO ================= */
  function knColor(kn) {
    if (kn < 5)  return '#5B8FC9';
    if (kn < 10) return '#2FB39A';
    if (kn < 15) return '#7CC94A';
    if (kn < 20) return '#E8D24A';
    if (kn < 25) return '#F59B23';
    if (kn < 30) return '#EB5A2D';
    return '#C13AA0';
  }

  function buildTimeline(hourly, waveByTime) {
    timelineEl.innerHTML = '';
    slotData = [];
    const times = hourly.time, spd = hourly.wind_speed_10m, dir = hourly.wind_direction_10m;
    const gst = hourly.wind_gusts_10m || [];
    const now = Date.now();
    let lastDay = -1, nowMarked = false;

    for (let i = 0; i < times.length; i += 2) {
      const t = new Date(times[i]);
      if (t.getTime() < now - 2 * 3600 * 1000) continue;
      const kn = spd[i + 1] != null ? (spd[i] + spd[i + 1]) / 2 : spd[i];
      const d = dir[i];
      if (kn == null || d == null) continue;
      const g = gst[i + 1] != null ? Math.max(gst[i], gst[i + 1]) : gst[i];
      const w = waveByTime ? waveByTime[times[i]] : null;

      const slot = document.createElement('div');
      slot.className = 'tl-slot';
      slot.dataset.idx = slotData.length;
      if (!nowMarked) { slot.classList.add('now'); nowMarked = true; }
      slotData.push({ t, kn, dir: d, gust: g != null ? g : null, wave: w != null ? w : null });

      const dayLbl = t.getDay() !== lastDay ? GIORNI[t.getDay()] + ' ' + t.getDate() : '';
      lastDay = t.getDay();

      slot.innerHTML =
        '<div class="tl-day">' + dayLbl + '</div>' +
        '<div class="tl-hour">' + String(t.getHours()).padStart(2, '0') + '</div>' +
        '<span class="tl-arrow" style="transform:rotate(' + Math.round(d + 180) + 'deg)">&#8593;</span>' +
        '<div class="tl-kn" style="color:' + knColor(kn) + '">' + Math.round(kn) + '</div>' +
        (g != null ? '<div class="tl-gust" style="color:' + knColor(g) + '">' + Math.round(g) + '</div>' : '') +
        (w != null ? '<div class="tl-wave">' + w.toFixed(1).replace('.', ',') + 'm</div>' : '');
      slot.addEventListener('click', () => setPreview(parseInt(slot.dataset.idx, 10)));
      timelineEl.appendChild(slot);
    }
  }

  function setPreview(idx) {
    const prevIdx = preview ? slotData.indexOf(preview) : -1;
    const sel = timelineEl.querySelector('.tl-slot.sel');
    if (sel) sel.classList.remove('sel');
    if (idx <= 0 || !slotData[idx]) {
      if (preview !== null) {
        preview = null;
        renderWindLabel(); renderRose();
        if (reducedMotion) drawStaticArrows();
        buzz();
      }
      return;
    }
    if (idx !== prevIdx) buzz();
    const el = timelineEl.children[idx];
    if (el) el.classList.add('sel');
    preview = slotData[idx];
    renderWindLabel();
  }

  let scrollRaf = null;
  timelineEl.addEventListener('scroll', () => {
    if (scrollRaf) return;
    scrollRaf = requestAnimationFrame(() => {
      scrollRaf = null;
      if (!slotData.length) return;
      if (timelineEl.scrollLeft < 20) { setPreview(-1); return; }
      const x = timelineEl.scrollLeft + 16;
      let idx = -1;
      for (let i = 0; i < timelineEl.children.length; i++) {
        const el = timelineEl.children[i];
        if (x < el.offsetLeft + el.offsetWidth) { idx = i; break; }
      }
      if (idx >= 0) setPreview(idx);
    });
  }, { passive: true });

  /* ================= METEO (Open-Meteo) ================= */
  async function fetchWind(lat, lon) {
    const now = Date.now();
    if (now - lastWindFetch < 10 * 60 * 1000) return;
    lastWindFetch = now;

    let waveByTime = null;
    const wavePromise = fetch(
      'https://marine-api.open-meteo.com/v1/marine?latitude=' + lat.toFixed(3) +
      '&longitude=' + lon.toFixed(3) +
      '&current=wave_height&hourly=wave_height&forecast_days=3&timezone=auto'
    ).then(r => r.json()).then(d => {
      if (d && d.hourly && d.hourly.wave_height) {
        waveByTime = {};
        d.hourly.time.forEach((t, i) => { waveByTime[t] = d.hourly.wave_height[i]; });
      }
      if (d && d.current && d.current.wave_height != null) waveNow = d.current.wave_height;
    }).catch(() => {});

    try {
      const r = await fetch(
        'https://api.open-meteo.com/v1/forecast?latitude=' + lat.toFixed(3) +
        '&longitude=' + lon.toFixed(3) +
        '&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m' +
        '&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m' +
        '&forecast_days=3&timezone=auto&wind_speed_unit=kn'
      );
      const d = await r.json();
      await wavePromise;
      if (d && d.current) {
        windFrom = d.current.wind_direction_10m;
        windKn = d.current.wind_speed_10m;
        windGust = d.current.wind_gusts_10m;
        renderWindLabel();
        if (reducedMotion) drawStaticArrows();
      }
      if (d && d.hourly) buildTimeline(d.hourly, waveByTime);
    } catch (_) {
      windLabel.textContent = 'vento: dati non disponibili offline';
    }
  }

  /* ================= GPS ================= */
  function onFix(pos) {
    const c = pos.coords;
    gpsPill.className = 'gps-pill live';
    gpsLabel.textContent = 'GPS LIVE';
    if (!reviewTrack) {
      accHint.textContent = c.accuracy ? ('precisione ±' + Math.round(c.accuracy) + ' m') : '';
    }

    let ms = c.speed;
    if (ms == null && lastFix) {
      const dt = (pos.timestamp - lastFix.t) / 1000;
      if (dt > 0.5) ms = haversine(lastFix.c, c) / dt;
    }
    lastFix = { c: { latitude: c.latitude, longitude: c.longitude }, t: pos.timestamp };
    if (ms == null || ms < 0) ms = 0;
    if (ms < 0.28) ms = 0;

    lastMs = ms;
    if (ms > maxMs) maxMs = ms;
    if (ms > 0) { sumMs += ms; samples++; }

    if (c.heading != null && !isNaN(c.heading) && ms > 0.5) {
      hdgVal.textContent = String(Math.round(c.heading)).padStart(3, '0');
      lastHeading = c.heading;
    }

    lastPos = { la: c.latitude, lo: c.longitude };
    if (follow) { viewLat = c.latitude; viewLon = c.longitude; requestMapDraw(); }
    else if (viewLat == null) { viewLat = c.latitude; viewLon = c.longitude; requestMapDraw(); }

    if (running && (c.accuracy == null || c.accuracy < 50)) recordPoint(c.latitude, c.longitude);
    drawOverlay();

    fetchWind(c.latitude, c.longitude);
    renderWindLabel();
    speedValue.classList.remove('stale');
    render();
  }

  function onErr(e) {
    gpsPill.className = 'gps-pill err';
    gpsLabel.textContent = e.code === 1 ? 'PERMESSO NEGATO' : 'NO SEGNALE';
    speedValue.classList.add('stale');
  }

  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    } catch (_) {}
  }

  function start() {
    if (!('geolocation' in navigator)) {
      gpsLabel.textContent = 'GPS NON DISPONIBILE';
      gpsPill.className = 'gps-pill err';
      return;
    }
    // nuova uscita: azzera traccia e statistiche
    track = []; trackNm = 0; savePending = 0;
    maxMs = 0; sumMs = 0; samples = 0; lastMs = 0;
    distVal.textContent = '0.0';
    try { localStorage.setItem('ss-live', '[]'); } catch (_) {}
    reviewTrack = null;
    setFollow(true);
    drawOverlay();
    render();

    sessionStart = Date.now();
    running = true;
    startBtn.textContent = 'Stop';
    startBtn.classList.add('running');
    gpsLabel.textContent = 'RICERCA…';
    watchId = navigator.geolocation.watchPosition(onFix, onErr, {
      enableHighAccuracy: true, maximumAge: 0, timeout: 15000
    });
    requestWakeLock();
  }

  function stop() {
    running = false;
    if (watchId != null) navigator.geolocation.clearWatch(watchId);
    watchId = null;
    if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
    try { localStorage.setItem('ss-live', JSON.stringify(track)); } catch (_) {}
    archiveSession();
    startBtn.textContent = 'Start';
    startBtn.classList.remove('running');
    gpsPill.className = 'gps-pill';
    gpsLabel.textContent = 'GPS OFF';
    speedValue.classList.add('stale');
  }

  startBtn.addEventListener('click', () => running ? stop() : start());

  resetBtn.addEventListener('click', () => {
    maxMs = 0; sumMs = 0; samples = 0; lastMs = 0; lastFix = null;
    lastHeading = null;
    track = []; trackNm = 0; savePending = 0;
    distVal.textContent = '0.0';
    try { localStorage.removeItem('ss-live'); } catch (_) {}
    hdgVal.textContent = '---';
    reviewTrack = null;
    drawOverlay();
    renderWindLabel();
    render();
  });

  /* ================= UNITÀ ================= */
  function cycleUnit() {
    if (panMoved) return; // era un trascinamento, non un tocco
    unitIdx = (unitIdx + 1) % UNITS.length;
    render();
  }
  $('speedBlock').addEventListener('click', cycleUnit);
  $('speedBlock').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); cycleUnit(); }
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && running) requestWakeLock();
  });

  /* ================= TEMA / BRANDING ================= */
  const themeToggle = $('themeToggle'), tgSog = $('tgSog'), tgOrza = $('tgOrza');
  function applyTheme(orza) {
    document.body.dataset.theme = orza ? 'orza' : '';
    themeToggle.setAttribute('aria-checked', String(orza));
    tgSog.classList.toggle('on', !orza);
    tgOrza.classList.toggle('on', orza);
    drawOverlay();
    if (reducedMotion) drawStaticArrows();
    try { localStorage.setItem('sog-theme', orza ? 'orza' : 'sog'); } catch (_) {}
  }
  function toggleTheme() { applyTheme(document.body.dataset.theme !== 'orza'); }
  themeToggle.addEventListener('click', toggleTheme);
  themeToggle.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleTheme(); }
  });
  try {
    if (localStorage.getItem('sog-theme') === 'orza') applyTheme(true);
  } catch (_) {}

  /* ================= AVVIO ================= */
  sizeCanvases();
  loadSessions();
  loadLive();
  drawOverlay();
  render();
  if (!reducedMotion) animate();
})();
</script>
</body>
</html>
