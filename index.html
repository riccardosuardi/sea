<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOG — Tachimetro Nautico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@300;500;700&family=Archivo:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1D2E;
    --deep: #071523;
    --foam: #EFF6F4;
    --signal: #FF5A1F;
    --slate: #5E7A8C;
    --ok: #3ADFA0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--deep);
    color: var(--foam);
    font-family: 'Archivo', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ---------- Background: map + wind particles ---------- */
  #mapCanvas, #windCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #mapCanvas { opacity: .28; filter: saturate(.5) brightness(.9); }
  #windCanvas { opacity: .85; }
  .bg-vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 90% 55% at 50% 42%, rgba(7,21,35,.35), rgba(7,21,35,.78) 75%),
      linear-gradient(to bottom, rgba(7,21,35,.85), transparent 20%, transparent 72%, rgba(7,21,35,.9));
  }
  header, main, .stats, .controls { position: relative; z-index: 2; }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 10px;
    border-bottom: 1px solid rgba(94,122,140,.25);
  }
  .brand { display: flex; align-items: baseline; gap: 8px; }
  .brand h1 {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .brand span {
    font-family: 'Chivo Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    color: var(--slate);
    text-transform: uppercase;
  }
  .gps-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Chivo Mono', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--slate);
    border: 1px solid rgba(94,122,140,.35);
    border-radius: 999px;
    padding: 5px 10px;
    background: rgba(7,21,35,.55);
    backdrop-filter: blur(4px);
  }
  .gps-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--slate);
    transition: background .3s;
  }
  .gps-pill.live .gps-dot { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .gps-pill.live { color: var(--ok); border-color: rgba(58,223,160,.4); }
  .gps-pill.err .gps-dot { background: var(--signal); }
  .gps-pill.err { color: var(--signal); border-color: rgba(255,90,31,.4); }

  /* ---------- Main ---------- */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 18px;
  }
  .speed-block {
    text-align: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .speed-value {
    font-family: 'Chivo Mono', monospace;
    font-weight: 700;
    font-size: clamp(96px, 34vw, 180px);
    line-height: .95;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 2px 24px rgba(7,21,35,.9), 0 0 60px rgba(7,21,35,.7);
  }
  .speed-value.stale { color: var(--slate); }
  .speed-unit {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-family: 'Chivo Mono', monospace;
    font-size: 14px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--signal);
    font-weight: 500;
    text-shadow: 0 1px 10px rgba(7,21,35,.9);
  }
  .speed-unit small {
    font-size: 9px;
    color: var(--slate);
    letter-spacing: .12em;
  }
  .wind-label {
    margin-top: 18px;
    font-family: 'Chivo Mono', monospace;
    font-size: 11px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--slate);
    text-shadow: 0 1px 8px rgba(7,21,35,.9);
    text-align: center;
  }
  .wind-label b { color: var(--foam); font-weight: 500; }
  .hint {
    margin-top: 8px;
    text-align: center;
    font-family: 'Chivo Mono', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    color: var(--slate);
    text-shadow: 0 1px 8px rgba(7,21,35,.9);
  }

  /* ---------- Stats ---------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: rgba(94,122,140,.25);
    border-top: 1px solid rgba(94,122,140,.25);
  }
  .stat {
    background: rgba(11,29,46,.88);
    backdrop-filter: blur(4px);
    padding: 14px 8px 16px;
    text-align: center;
  }
  .stat b {
    display: block;
    font-family: 'Chivo Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .stat span {
    display: block;
    margin-top: 4px;
    font-family: 'Chivo Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--slate);
  }

  /* ---------- Controls ---------- */
  .controls {
    display: flex;
    gap: 10px;
    padding: 14px 18px calc(16px + env(safe-area-inset-bottom));
    background: rgba(11,29,46,.92);
    backdrop-filter: blur(4px);
  }
  button {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: .12em;
    text-transform: uppercase;
    border: none;
    border-radius: 12px;
    padding: 16px 0;
    cursor: pointer;
    transition: transform .1s, opacity .2s;
  }
  button:active { transform: scale(.97); }
  button:focus-visible { outline: 3px solid var(--foam); outline-offset: 2px; }
  #startBtn { flex: 2; background: var(--signal); color: #fff; }
  #startBtn.running {
    background: rgba(255,90,31,.15);
    color: var(--signal);
    border: 1px solid var(--signal);
  }
  #resetBtn {
    flex: 1;
    background: transparent;
    color: var(--slate);
    border: 1px solid rgba(94,122,140,.4);
  }

  @media (prefers-reduced-motion: reduce) {
    .gps-dot, button { transition: none; }
  }
</style>
</head>
<body>

<canvas id="mapCanvas"></canvas>
<canvas id="windCanvas"></canvas>
<div class="bg-vignette"></div>

<header>
  <div class="brand">
    <h1>SOG</h1>
    <span>speed over ground</span>
  </div>
  <div class="gps-pill" id="gpsPill">
    <div class="gps-dot"></div>
    <span id="gpsLabel">GPS OFF</span>
  </div>
</header>

<main>
  <div class="speed-block" id="speedBlock" role="button" tabindex="0" aria-label="Tocca per cambiare unità di misura">
    <div class="speed-value stale" id="speedValue">0.0</div>
    <div class="speed-unit">
      <span id="unitLabel">NODI</span>
      <small>· tocca per cambiare</small>
    </div>
  </div>
  <div class="wind-label" id="windLabel">vento: in attesa del GPS</div>
  <div class="hint" id="accHint"></div>
</main>

<div class="stats">
  <div class="stat"><b id="maxVal">0.0</b><span>Max</span></div>
  <div class="stat"><b id="avgVal">0.0</b><span>Media</span></div>
  <div class="stat"><b id="hdgVal">---</b><span>Rotta °</span></div>
</div>

<div class="controls">
  <button id="startBtn">Start</button>
  <button id="resetBtn">Reset</button>
</div>

<script>
(function () {
  const UNITS = [
    { key: 'kn',  label: 'NODI', factor: 1.943844 },
    { key: 'kmh', label: 'KM/H', factor: 3.6 },
    { key: 'mph', label: 'MPH',  factor: 2.236936 }
  ];
  let unitIdx = 0;
  let watchId = null;
  let running = false;
  let maxMs = 0, sumMs = 0, samples = 0, lastMs = 0;
  let lastFix = null;
  let wakeLock = null;
  let windFrom = null;   // gradi di provenienza (0 = N)
  let windKn = null;     // nodi
  let lastHeading = null;
  let lastWindFetch = 0;
  let mapDrawnAt = null; // {lat, lon} dell'ultima mappa disegnata

  const $ = id => document.getElementById(id);
  const speedValue = $('speedValue'), unitLabel = $('unitLabel');
  const maxVal = $('maxVal'), avgVal = $('avgVal'), hdgVal = $('hdgVal');
  const gpsPill = $('gpsPill'), gpsLabel = $('gpsLabel');
  const startBtn = $('startBtn'), resetBtn = $('resetBtn');
  const windLabel = $('windLabel'), accHint = $('accHint');
  const mapCanvas = $('mapCanvas'), windCanvas = $('windCanvas');
  const mapCtx = mapCanvas.getContext('2d');
  const windCtx = windCanvas.getContext('2d');
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const CARDINALI = ['N','NE','E','SE','S','SO','O','NO'];
  const cardinale = deg => CARDINALI[Math.round(deg / 45) % 8];

  function fmt(ms) { return (ms * UNITS[unitIdx].factor).toFixed(1); }

  function render() {
    speedValue.textContent = fmt(lastMs);
    maxVal.textContent = fmt(maxMs);
    avgVal.textContent = samples ? fmt(sumMs / samples) : fmt(0);
    unitLabel.textContent = UNITS[unitIdx].label;
  }

  function renderWindLabel() {
    if (windFrom == null) return;
    const knTxt = windKn != null ? windKn.toFixed(0) + ' kn' : '';
    let txt = 'vento <b>' + knTxt + '</b> da ' + cardinale(windFrom) + ' (' + Math.round(windFrom) + '°)';
    if (lastHeading != null) {
      const rel = ((windFrom - lastHeading + 540) % 360) - 180;
      const side = rel > 8 ? 'a dritta' : rel < -8 ? 'a sinistra' : 'in prua';
      txt += ' · ' + (side === 'in prua' ? 'in prua' : Math.abs(Math.round(rel)) + '° ' + side);
    }
    windLabel.innerHTML = txt;
  }

  /* ================= CANVAS: dimensioni ================= */
  function sizeCanvases() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    for (const c of [mapCanvas, windCanvas]) {
      c.width = Math.round(innerWidth * dpr);
      c.height = Math.round(innerHeight * dpr);
    }
    mapCtx.setTransform(1,0,0,1,0,0);
    windCtx.setTransform(1,0,0,1,0,0);
    initParticles();
    if (mapDrawnAt) drawMap(mapDrawnAt.lat, mapDrawnAt.lon, true);
  }
  window.addEventListener('resize', sizeCanvases);

  /* ================= MAPPA (OpenStreetMap) ================= */
  const ZOOM = 12, TILE = 256;
  function drawMap(lat, lon, force) {
    // ridisegna solo se ci si è spostati di parecchio (~1 km) o su force
    if (!force && mapDrawnAt) {
      const dLat = Math.abs(lat - mapDrawnAt.lat), dLon = Math.abs(lon - mapDrawnAt.lon);
      if (dLat < 0.01 && dLon < 0.01) return;
    }
    mapDrawnAt = { lat, lon };

    const n = Math.pow(2, ZOOM);
    const xt = (lon + 180) / 360 * n;
    const latR = lat * Math.PI / 180;
    const yt = (1 - Math.log(Math.tan(latR) + 1 / Math.cos(latR)) / Math.PI) / 2 * n;

    const W = mapCanvas.width, H = mapCanvas.height;
    const cx = W / 2, cy = H / 2;
    const cols = Math.ceil(W / TILE / 2) + 1;
    const rows = Math.ceil(H / TILE / 2) + 1;

    mapCtx.fillStyle = '#071523';
    mapCtx.fillRect(0, 0, W, H);

    for (let dx = -cols; dx <= cols; dx++) {
      for (let dy = -rows; dy <= rows; dy++) {
        const tx = Math.floor(xt) + dx, ty = Math.floor(yt) + dy;
        if (tx < 0 || ty < 0 || tx >= n || ty >= n) continue;
        const px = cx + (tx - xt) * TILE;
        const py = cy + (ty - yt) * TILE;
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => mapCtx.drawImage(img, Math.round(px), Math.round(py), TILE, TILE);
        img.src = 'https://tile.openstreetmap.org/' + ZOOM + '/' + tx + '/' + ty + '.png';
      }
    }
    // pin posizione
    setTimeout(() => {
      mapCtx.beginPath();
      mapCtx.arc(cx, cy, 7, 0, Math.PI * 2);
      mapCtx.fillStyle = '#FF5A1F';
      mapCtx.fill();
      mapCtx.lineWidth = 3;
      mapCtx.strokeStyle = '#EFF6F4';
      mapCtx.stroke();
    }, 800);
  }

  /* ================= PARTICELLE DI VENTO ================= */
  let particles = [];
  const N_PART = 130;
  function initParticles() {
    particles = [];
    for (let i = 0; i < N_PART; i++) particles.push(spawn());
  }
  function spawn() {
    return {
      x: Math.random() * windCanvas.width,
      y: Math.random() * windCanvas.height,
      life: 40 + Math.random() * 80
    };
  }

  let rafId = null;
  function animate() {
    const W = windCanvas.width, H = windCanvas.height;
    // dissolvenza scie
    windCtx.globalCompositeOperation = 'destination-in';
    windCtx.fillStyle = 'rgba(0,0,0,0.94)';
    windCtx.fillRect(0, 0, W, H);
    windCtx.globalCompositeOperation = 'source-over';

    if (windFrom != null) {
      // direzione verso cui soffia il vento (windFrom = provenienza)
      const toRad = (windFrom + 180) * Math.PI / 180;
      const spd = 0.4 + (windKn || 5) * 0.14; // px/frame scalati sui nodi
      const vx = Math.sin(toRad) * spd;
      const vy = -Math.cos(toRad) * spd;

      windCtx.strokeStyle = 'rgba(239,246,244,0.75)';
      windCtx.lineWidth = 1.4;
      windCtx.lineCap = 'round';
      windCtx.beginPath();
      for (const p of particles) {
        const nx = p.x + vx, ny = p.y + vy;
        windCtx.moveTo(p.x, p.y);
        windCtx.lineTo(nx, ny);
        p.x = nx; p.y = ny;
        p.life--;
        if (p.life <= 0 || nx < -20 || ny < -20 || nx > W + 20 || ny > H + 20) {
          Object.assign(p, spawn(), { life: 40 + Math.random() * 80 });
        }
      }
      windCtx.stroke();
    }
    rafId = requestAnimationFrame(animate);
  }

  // Con reduced-motion: frecce statiche invece delle particelle animate
  function drawStaticArrows() {
    const W = windCanvas.width, H = windCanvas.height;
    windCtx.clearRect(0, 0, W, H);
    if (windFrom == null) return;
    const toRad = (windFrom + 180) * Math.PI / 180;
    const step = 90;
    windCtx.strokeStyle = 'rgba(239,246,244,0.5)';
    windCtx.lineWidth = 1.5;
    for (let x = step / 2; x < W; x += step) {
      for (let y = step / 2; y < H; y += step) {
        const len = 18;
        const ex = x + Math.sin(toRad) * len, ey = y - Math.cos(toRad) * len;
        windCtx.beginPath();
        windCtx.moveTo(x, y);
        windCtx.lineTo(ex, ey);
        // punta
        const a = Math.atan2(ey - y, ex - x);
        windCtx.lineTo(ex - 6 * Math.cos(a - 0.5), ey - 6 * Math.sin(a - 0.5));
        windCtx.moveTo(ex, ey);
        windCtx.lineTo(ex - 6 * Math.cos(a + 0.5), ey - 6 * Math.sin(a + 0.5));
        windCtx.stroke();
      }
    }
  }

  /* ================= METEO (Open-Meteo) ================= */
  async function fetchWind(lat, lon) {
    const now = Date.now();
    if (now - lastWindFetch < 10 * 60 * 1000) return;
    lastWindFetch = now;
    try {
      const r = await fetch(
        'https://api.open-meteo.com/v1/forecast?latitude=' + lat.toFixed(3) +
        '&longitude=' + lon.toFixed(3) +
        '&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn'
      );
      const d = await r.json();
      if (d && d.current) {
        windFrom = d.current.wind_direction_10m;
        windKn = d.current.wind_speed_10m;
        renderWindLabel();
        if (reducedMotion) drawStaticArrows();
      }
    } catch (_) {
      windLabel.textContent = 'vento: dati non disponibili offline';
    }
  }

  /* ================= GPS ================= */
  function haversine(a, b) {
    const R = 6371000, rad = Math.PI / 180;
    const dLat = (b.latitude - a.latitude) * rad;
    const dLon = (b.longitude - a.longitude) * rad;
    const s = Math.sin(dLat/2)**2 +
      Math.cos(a.latitude*rad) * Math.cos(b.latitude*rad) * Math.sin(dLon/2)**2;
    return 2 * R * Math.asin(Math.sqrt(s));
  }

  function onFix(pos) {
    const c = pos.coords;
    gpsPill.className = 'gps-pill live';
    gpsLabel.textContent = 'GPS LIVE';
    accHint.textContent = c.accuracy ? ('precisione ±' + Math.round(c.accuracy) + ' m') : '';

    let ms = c.speed;
    if (ms == null && lastFix) {
      const dt = (pos.timestamp - lastFix.t) / 1000;
      if (dt > 0.5) ms = haversine(lastFix.c, c) / dt;
    }
    lastFix = { c: { latitude: c.latitude, longitude: c.longitude }, t: pos.timestamp };
    if (ms == null || ms < 0) ms = 0;
    if (ms < 0.28) ms = 0;

    lastMs = ms;
    if (ms > maxMs) maxMs = ms;
    if (ms > 0) { sumMs += ms; samples++; }

    if (c.heading != null && !isNaN(c.heading) && ms > 0.5) {
      hdgVal.textContent = String(Math.round(c.heading)).padStart(3, '0');
      lastHeading = c.heading;
    }

    drawMap(c.latitude, c.longitude, false);
    fetchWind(c.latitude, c.longitude);
    renderWindLabel();
    speedValue.classList.remove('stale');
    render();
  }

  function onErr(e) {
    gpsPill.className = 'gps-pill err';
    gpsLabel.textContent = e.code === 1 ? 'PERMESSO NEGATO' : 'NO SEGNALE';
    speedValue.classList.add('stale');
  }

  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
    } catch (_) {}
  }

  function start() {
    if (!('geolocation' in navigator)) {
      gpsLabel.textContent = 'GPS NON DISPONIBILE';
      gpsPill.className = 'gps-pill err';
      return;
    }
    running = true;
    startBtn.textContent = 'Stop';
    startBtn.classList.add('running');
    gpsLabel.textContent = 'RICERCA…';
    watchId = navigator.geolocation.watchPosition(onFix, onErr, {
      enableHighAccuracy: true, maximumAge: 0, timeout: 15000
    });
    requestWakeLock();
  }

  function stop() {
    running = false;
    if (watchId != null) navigator.geolocation.clearWatch(watchId);
    watchId = null;
    if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
    startBtn.textContent = 'Start';
    startBtn.classList.remove('running');
    gpsPill.className = 'gps-pill';
    gpsLabel.textContent = 'GPS OFF';
    speedValue.classList.add('stale');
  }

  startBtn.addEventListener('click', () => running ? stop() : start());

  resetBtn.addEventListener('click', () => {
    maxMs = 0; sumMs = 0; samples = 0; lastMs = 0; lastFix = null;
    lastHeading = null;
    hdgVal.textContent = '---';
    renderWindLabel();
    render();
  });

  function cycleUnit() { unitIdx = (unitIdx + 1) % UNITS.length; render(); }
  $('speedBlock').addEventListener('click', cycleUnit);
  $('speedBlock').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); cycleUnit(); }
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && running) requestWakeLock();
  });

  sizeCanvases();
  render();
  if (!reducedMotion) animate();
})();
</script>
</body>
</html>
